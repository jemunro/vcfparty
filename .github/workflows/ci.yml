name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v26.04) — leave empty for test-only run'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache libdeflate build
        uses: actions/cache@v4
        with:
          path: vendor/libdeflate/build/
          key: libdeflate-build-${{ hashFiles('.gitmodules', 'vendor/libdeflate/**') }}

      - name: Cache test fixtures
        uses: actions/cache@v4
        with:
          path: tests/data/
          key: test-fixtures-${{ hashFiles('tests/generate_fixtures.sh') }}

      - name: Generate test fixtures
        run: bash tests/generate_fixtures.sh

      - name: Test
        run: nimble test -y
        env:
          BLOCKY_TEST_TIMEOUT: "10"
          BLOCKY_IGNORE_TIMEOUT: "0"

      - name: Build release
        run: rm -f blocky && nimble release -y && strip blocky

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: blocky-binary
          path: blocky

  release:
    needs: build-and-test
    if: inputs.tag != ''
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blocky-binary

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
          files: blocky

  push-images:
    needs: build-and-test
    if: inputs.tag != ''
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - base: quay.io/biocontainers/bcftools:1.23.1--hb2cee57_0
            suffix: bcftools
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: blocky-binary

      - run: chmod +x blocky

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/blocky-${{ matrix.suffix }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository }}/blocky-${{ matrix.suffix }}:latest
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
