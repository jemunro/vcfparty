name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths: [README.md]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p _site/docs

      - name: Build site
        uses: docker://pandoc/core:3.2
        with:
          args: >-
            README.md
            --standalone
            --template docs/template.html
            --from gfm
            --to html5
            --highlight-style pygments
            -o _site/index.html

      - name: Copy assets
        run: cp docs/blocky_diagram.svg _site/docs/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
